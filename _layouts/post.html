---
layout: default
---

<article class="panel prose post">
  <header class="post-header">
    <p class="meta">{{ page.date | date: "%B %d, %Y" }} · {{ page.tags | join: ", " }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.excerpt %}
      <p class="lede">{{ page.excerpt | strip_html }}</p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
